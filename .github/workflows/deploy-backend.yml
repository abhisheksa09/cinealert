name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - "runtime.txt"
      - "render.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
