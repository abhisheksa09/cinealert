name: Daily CineAlert Scan

on:
  schedule:
    - cron: "50 7 * * *"   # 07:50 UTC — wakes Render 10 min before 8am scan
  workflow_dispatch:        # allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render and wait for it to be ready
        run: |
          echo "Pinging server to wake it up..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cinealert-api.onrender.com/docs)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server is up!"
              break
            fi
            sleep 15
          done

      - name: Trigger daily scan
        run: |
          echo "Triggering scan..."
          curl -s -X POST https://cinealert-api.onrender.com/scan
          echo "Scan triggered."
