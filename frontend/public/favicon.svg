<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e50914"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Film clapperboard body -->
  <rect x="12" y="22" width="40" height="28" rx="4" fill="white" fill-opacity="0.15"/>
  <rect x="12" y="22" width="40" height="28" rx="4" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9"/>
  <!-- Clapperboard top bar -->
  <rect x="12" y="14" width="40" height="10" rx="3" fill="white" fill-opacity="0.95"/>
  <!-- Clapper stripes -->
  <rect x="18" y="14" width="5" height="10" fill="#7c3aed" fill-opacity="0.7"/>
  <rect x="28" y="14" width="5" height="10" fill="#7c3aed" fill-opacity="0.7"/>
  <rect x="38" y="14" width="5" height="10" fill="#7c3aed" fill-opacity="0.7"/>
  <!-- Play triangle -->
  <polygon points="26,30 26,42 42,36" fill="white" fill-opacity="0.9"/>
</svg>
